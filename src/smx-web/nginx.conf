server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # No /api proxy block. Application Gateway's apiPathRule routes /api/* to the
    # backend container before traffic ever reaches this server, which is also what
    # keeps the API same-origin and lets the backend skip a CORS policy.

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: deep links like /p/proj-abc/matrix must serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
